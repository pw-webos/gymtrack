<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GymTrack v2.2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0614;--surf:#120c26;--surf2:#1a1035;--b1:#2d1b69;--b2:#3b0764;--acc:#a855f7;--acc2:#7c3aed;--acc3:#6d28d9;--t1:#e9d5ff;--t2:#c4b5fd;--t3:#7c3aed;--t4:#4c1d95;--green:#22c55e;--red:#ef4444;--gold:#f59e0b}
body{background:var(--bg);color:var(--t1);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--b2);display:flex;z-index:50}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;background:none;border:none;color:var(--t3);font-size:10px}
.nb.on{color:var(--acc)}
.nb svg{width:22px;height:22px}
.pg{display:none;padding:0 0 80px}
.pg.on{display:block}
.hdr{padding:20px 16px 12px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#e9d5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:12px;color:var(--t3);margin-top:2px}
.card{background:var(--surf);border:1px solid var(--b2);border-radius:16px;padding:16px;margin:0 16px 12px}
.dstrip{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none}
.dstrip::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid var(--b2);background:var(--surf);color:var(--t2);font-size:13px;font-weight:500;line-height:1.4;text-align:center}
.dpill.on{background:var(--acc);border-color:var(--acc);color:#fff}
.dpill.rest{opacity:0.5}
.wcrd{background:var(--surf);border:1px solid var(--b2);border-radius:16px;margin:0 16px 12px;overflow:hidden}
.whdr{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;background:var(--surf2)}
.wbadge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.bp{background:#3b0764;color:#c4b5fd}.bpu{background:#1e3a5f;color:#93c5fd}
.bl{background:#1a3320;color:#86efac}.bup{background:#3b2a00;color:#fcd34d}.blo{background:#2d1515;color:#fca5a5}
.exblk{border-top:1px solid var(--b1);padding:12px 16px}
.exhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.exnm{font-size:14px;font-weight:600;color:var(--t1)}
.extag{font-size:10px;color:var(--t3);margin-top:2px}
.mbtn{background:none;border:1px solid var(--b2);border-radius:8px;padding:4px 8px;font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:8px}
.sgrid{display:grid;grid-template-columns:24px 1fr 1fr 34px;gap:6px;align-items:center;margin-bottom:4px}
.snum{font-size:11px;color:var(--t3);text-align:center}
.sinp{background:var(--surf2);border:1px solid var(--b2);border-radius:8px;color:var(--t1);padding:7px 6px;font-size:14px;width:100%;text-align:center}
.sinp:focus{outline:none;border-color:var(--acc)}
.sinp::placeholder{color:var(--t4);font-size:12px}
.schk{width:32px;height:32px;border-radius:50%;border:2px solid var(--b2);background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.schk.on{background:var(--acc);border-color:var(--acc)}
.phint{font-size:10px;color:var(--acc3);margin-bottom:4px;padding-left:30px}
.asbtn{width:100%;padding:7px;border:1px dashed var(--b2);border-radius:8px;background:none;color:var(--t3);font-size:12px;margin-top:8px}
.tbar{display:flex;align-items:center;gap:10px;background:var(--surf2);border-radius:10px;padding:8px 12px;margin-top:8px}
.tpresets{display:flex;gap:4px}
.tpre{font-size:11px;padding:3px 7px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2)}
.tpre.on{background:var(--acc);border-color:var(--acc);color:#fff}
.tplay{width:34px;height:34px;border-radius:50%;background:var(--acc);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prwrap{padding:0 16px 16px}
.prlbl{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:4px}
.prtrack{height:6px;background:var(--b2);border-radius:3px;overflow:hidden}
.prfill{height:100%;background:var(--acc);border-radius:3px;transition:width 0.3s}
.fbtn{display:block;margin:0 16px 16px;width:calc(100% - 32px);padding:15px;border-radius:14px;background:linear-gradient(135deg,var(--acc2),var(--acc));border:none;color:#fff;font-size:16px;font-weight:700}
.fbtn:disabled{opacity:0.4}
.pb{font-size:9px;background:var(--gold);color:#000;border-radius:4px;padding:1px 5px;font-weight:700;margin-left:6px;vertical-align:middle}
.movl{position:fixed;inset:0;background:rgba(10,6,20,0.93);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.movl.on{display:flex}
.mbox{background:var(--surf);border:1px solid var(--acc);border-radius:20px;padding:22px 18px 20px;max-width:340px;width:100%;position:relative;max-height:88vh;overflow-y:auto}
.mclose{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--t3);font-size:26px;line-height:1}
.sgrd{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 12px}
.scrd{background:var(--surf);border:1px solid var(--b2);border-radius:14px;padding:14px}
.slbl{font-size:11px;color:var(--t3);margin-bottom:4px}
.sval{font-size:24px;font-weight:700}
.ssub{font-size:11px;color:var(--t3);margin-top:2px}
.bchart{padding:0 16px 16px}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.blbl{font-size:11px;color:var(--t3);width:64px;flex-shrink:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.btrack{flex:1;height:20px;background:var(--surf2);border-radius:4px;overflow:hidden}
.bfill{height:100%;background:var(--acc);border-radius:4px;display:flex;align-items:center;padding-left:6px;min-width:4px}
.bval{font-size:10px;color:#fff;white-space:nowrap}
.hitem{background:var(--surf);border:1px solid var(--b2);border-radius:14px;padding:14px 16px;margin:0 16px 10px;display:flex;justify-content:space-between;align-items:center}
.uinput{background:var(--surf2);border:1px solid var(--b2);border-radius:10px;color:var(--t1);padding:10px 12px;font-size:14px;width:100%;margin-bottom:10px}
.uinput:focus{outline:none;border-color:var(--acc)}
.btnp{width:100%;padding:13px;border-radius:12px;background:var(--acc);border:none;color:#fff;font-size:15px;font-weight:600;margin-bottom:8px}
.btns{width:100%;padding:11px;border-radius:12px;background:none;border:1px solid var(--b2);color:var(--t2);font-size:14px;margin-bottom:8px}
.sstatus{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px}
.sconn{background:#0d2b1a;color:#86efac;border:1px solid #166534}
.sdisc{background:#1f1010;color:#fca5a5;border:1px solid #7f1d1d}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dg{background:var(--green)}.dr{background:var(--red)}
.stitle{font-size:13px;font-weight:600;color:var(--t3);padding:0 16px;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="movl" id="mmodal">
  <div class="mbox">
    <button class="mclose" id="mclose">&#215;</button>
    <div id="mtitle" style="font-size:16px;font-weight:700;margin-bottom:4px;color:var(--t1)"></div>
    <div id="mtags" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>
    <div id="mdiag" style="position:relative;width:100%;padding-bottom:56.25%;border-radius:10px;overflow:hidden;background:#000;margin-bottom:12px">
      <iframe id="mframe" style="position:absolute;inset:0;width:100%;height:100%;border:none" allowfullscreen></iframe>
    </div>
    <div id="mtip" style="font-size:12px;color:var(--t2);line-height:1.6;padding-top:12px;border-top:1px solid var(--b2)"></div>
  </div>
</div>
<nav class="nav">
  <button class="nb on" id="ntoday" onclick="showPage('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Today
  </button>
  <button class="nb" id="nprogress" onclick="showPage('progress')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </button>
  <button class="nb" id="nsettings" onclick="showPage('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Settings
  </button>
</nav>
<div class="pg on" id="ptoday">
  <div class="hdr">
    <div><h1>GymTrack</h1><div class="sub" id="dateLabel"></div></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div id="streakEl" style="background:var(--surf2);border:1px solid var(--b2);border-radius:10px;padding:6px 12px;font-size:13px;color:var(--gold)"></div>
      <div style="font-size:9px;color:var(--t4)">v2.2</div>
    </div>
  </div>
  <div class="dstrip" id="dstrip"></div>
  <div id="wcontent"></div>
</div>
<div class="pg" id="pprogress">
  <div class="hdr"><div><h1>Progress</h1><div class="sub">Stats and history</div></div></div>
  <div class="sgrd" id="statsGrid"></div>
  <div class="stitle">Volume by muscle</div>
  <div class="bchart" id="volChart"></div>
  <div class="stitle">Recent sessions</div>
  <div id="histList"></div>
</div>
<div class="pg" id="psettings">
  <div class="hdr"><div><h1>Settings</h1><div class="sub">Sync and data</div></div></div>
  <div class="card">
    <div style="font-size:15px;font-weight:600;margin-bottom:4px">Google Sheets Sync</div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:14px;line-height:1.5">Paste your Apps Script Web App URL to auto-sync sessions.</div>
    <div id="ssStatus"></div>
    <input class="uinput" id="ssUrl" placeholder="https://script.google.com/macros/s/..."/>
    <button class="btnp" onclick="saveSheets()">Save and connect</button>
    <button class="btns" onclick="clearSheets()">Disconnect</button>
    <div style="font-size:12px;color:var(--t3);line-height:1.6;padding-top:12px;border-top:1px solid var(--b2)">
      <b style="color:var(--t2)">Sheet columns:</b><br>Date, Day, Exercise, Set, Reps, Weight kg, Volume, Notes
    </div>
  </div>
  <div class="card">
    <div style="font-size:15px;font-weight:600;margin-bottom:10px">Data</div>
    <button class="btns" onclick="exportCSV()">Export as CSV</button>
    <button class="btns" style="border-color:#7f1d1d;color:#fca5a5" onclick="confirmClear()">Clear all data</button>
  </div>
</div>
<script>
(function(){

// ── TIPS stored separately to avoid quote conflicts ───────────────────
var TIPS = {
  "Barbell Bench Press":    "Retract shoulder blades, feet flat. Bar touches lower chest. 3 min rest — this is a strength lift.",
  "Barbell Overhead Press": "Squeeze glutes and core. Bar travels straight up, tuck chin as bar passes.",
  "Weighted Pull-Up":       "Dead hang start. Pull elbows to hips — focus on lat engagement, not arm pulling.",
  "Pendlay Row":            "Bar starts on floor each rep. Explosive pull to lower chest.",
  "Face Pulls":             "External rotation at end position. Non-negotiable for shoulder health.",
  "Dead Bug":               "Lower back pressed flat throughout. Slow and controlled — core stability.",
  "Barbell Back Squat":     "Chest up, knees track toes. Break parallel for full depth.",
  "Romanian Deadlift":      "Hip hinge — push hips back, feel the hamstring stretch. Bar stays close to legs.",
  "Leg Press":              "Feet shoulder-width, mid-plate. Full range — do not lock knees at top.",
  "Walking Lunges":         "Long stride, knee barely touches floor. Upright torso throughout.",
  "Seated Calf Raise":      "Soleus (seated) differs from gastrocnemius (standing). Both needed for full calf development.",
  "Plank Hip Extension":    "Squeeze glute fully at top of each extension. Anti-extension core work.",
  "Incline Dumbbell Press": "Full range — touch chest at bottom. Stretched position maximises upper pec hypertrophy.",
  "Flat Barbell Bench Press":"Lower intensity than Monday. Focus on the squeeze at the top.",
  "Cable Lateral Raise":    "Cable provides constant tension — superior to dumbbells for lateral delt development.",
  "Dumbbell Shoulder Press":"Neutral grip option available. Control the eccentric — 2 seconds down.",
  "Tricep Pushdown":        "Keep elbows pinned. Full extension at bottom — do not let them flare.",
  "Overhead Tricep Extension":"Stretches the long head — two thirds of tricep mass. Non-negotiable for arm size.",
  "Cable Chest Fly":        "Low-to-high path for upper pec. Squeeze at midline — peak contraction matters.",
  "Lat Pulldown":           "Lean back slightly, pull to upper chest. Initiate with lats, not arms.",
  "Cable Row":              "Neutral grip. Full stretch forward, row to lower chest. Feel the lat stretch at the start.",
  "Single-Arm DB Row":      "Let shoulder drop fully at bottom for full lat stretch.",
  "Incline Dumbbell Curl":  "Incline stretches the long head. Slow eccentric — 3 seconds down.",
  "Hammer Curl":            "Hits brachialis under the bicep — makes arms look thicker. Neutral grip throughout.",
  "Reverse Curl":           "Builds forearm size and brachialis that pushes bicep up. Often skipped.",
  "Hack Squat":             "Safer spine load than back squat for pure quad hypertrophy. Full depth.",
  "Lying Leg Curl":         "Plantarflex (point toes) to increase activation. Slow eccentric.",
  "Hip Thrust":             "Best glute exercise by EMG activation (Contreras et al. 2015). Squeeze hard at top.",
  "Leg Extension":          "Isolation finisher. Full ROM confirmed safe (Siebert et al. 2023).",
  "Standing Calf Raise":    "Straight leg targets gastrocnemius. Slow and full range — calves need high volume.",
  "Copenhagen Plank":       "Targets adductors — most undertrained muscle. Linked to groin injury prevention."
};

// ── PROGRAM ────────────────────────────────────────────────────────────
var PROG = [
  {day:"Monday", label:"Upper - Strength", type:"upper",
   mob:["Shoulder CARs - 5 reps each direction","Band pull-aparts - 2x15","Thoracic rotations - 8 per side","Scapular wall slides - 10 reps"],
   ex:[
    {n:"Barbell Bench Press",    m:["Chest","Front Delts","Triceps"],    sets:4, reps:"4-6",   rest:180, f:["chest","frontdelt","triceps"],         b:[]},
    {n:"Barbell Overhead Press", m:["Shoulders","Triceps","Upper Chest"],sets:4, reps:"4-6",   rest:180, f:["frontdelt","triceps"],                 b:["traps"]},
    {n:"Weighted Pull-Up",       m:["Lats","Biceps","Rear Delts"],       sets:4, reps:"4-6",   rest:180, f:["biceps"],                             b:["lats","midback","reardelt"]},
    {n:"Pendlay Row",            m:["Lats","Traps","Biceps"],            sets:4, reps:"5-6",   rest:120, f:["biceps"],                             b:["lats","midback","traps"]},
    {n:"Face Pulls",             m:["Rear Delts","Rotator Cuff"],        sets:3, reps:"12-15", rest:90,  f:[],                                     b:["reardelt"]},
    {n:"Dead Bug",               m:["Core","TVA"],                       sets:3, reps:"8/side",rest:60,  f:["abs"],                                b:[]}
  ]},
  {day:"Tuesday", label:"Lower - Strength", type:"lower",
   mob:["Hip CARs - 5 reps each direction per side","90/90 hip flow - 60s per side","Deep squat hold - 60s","Ankle circles - 10 per side"],
   ex:[
    {n:"Barbell Back Squat", m:["Quads","Glutes","Core"],           sets:4, reps:"4-6",   rest:180, f:["quads","abs"], b:["glutes","lowerback"]},
    {n:"Romanian Deadlift",  m:["Hamstrings","Glutes","Lower Back"],sets:4, reps:"5-6",   rest:180, f:[],              b:["hamstrings","glutes","lowerback"]},
    {n:"Leg Press",          m:["Quads","Glutes"],                  sets:3, reps:"8-10",  rest:120, f:["quads"],        b:["glutes"]},
    {n:"Walking Lunges",     m:["Quads","Glutes","Balance"],        sets:3, reps:"8/leg", rest:90,  f:["quads"],        b:["glutes","hamstrings"]},
    {n:"Seated Calf Raise",  m:["Soleus","Calves"],                 sets:4, reps:"10-12", rest:60,  f:["calves"],       b:["calves"]},
    {n:"Plank Hip Extension",m:["Core","Glutes"],                   sets:3, reps:"45 sec",rest:60,  f:["abs"],          b:["glutes","lowerback"]}
  ]},
  {day:"Wednesday", label:"Push - Hypertrophy", type:"push",
   mob:["Pec minor stretch - 60s","Shoulder pass-throughs - 10 reps","Scapular push-ups - 10 reps","Band pull-aparts - 2x15"],
   ex:[
    {n:"Incline Dumbbell Press",    m:["Upper Chest","Front Delts","Triceps"],sets:4, reps:"8-10",  rest:90, f:["chest","frontdelt","triceps"],b:[]},
    {n:"Flat Barbell Bench Press",  m:["Chest","Triceps"],                    sets:3, reps:"10-12", rest:90, f:["chest","triceps"],            b:[]},
    {n:"Cable Lateral Raise",       m:["Lateral Delts"],                      sets:4, reps:"12-15", rest:60, f:["frontdelt"],                  b:[]},
    {n:"Dumbbell Shoulder Press",   m:["Shoulders","Triceps"],                sets:3, reps:"10-12", rest:90, f:["frontdelt","triceps"],        b:["traps"]},
    {n:"Tricep Pushdown",           m:["Triceps"],                            sets:3, reps:"12-15", rest:60, f:["triceps"],                    b:[]},
    {n:"Overhead Tricep Extension", m:["Triceps Long Head"],                  sets:3, reps:"12-15", rest:60, f:["triceps"],                    b:[]},
    {n:"Cable Chest Fly",           m:["Chest","Front Delts"],                sets:3, reps:"12-15", rest:60, f:["chest","frontdelt"],          b:[]}
  ]},
  {day:"Thursday", label:"Pull - Hypertrophy", type:"pull",
   mob:["Lat stretch at rack - 30s per side","Cat-cow - 10 reps","Thoracic foam roll - 60s","Band pull-aparts - 2x15"],
   ex:[
    {n:"Lat Pulldown",          m:["Lats","Biceps","Rear Delts"], sets:4, reps:"8-10",  rest:90, f:["biceps"],            b:["lats","midback","reardelt"]},
    {n:"Cable Row",             m:["Lats","Mid Back","Biceps"],   sets:4, reps:"10-12", rest:90, f:["biceps"],            b:["lats","midback"]},
    {n:"Single-Arm DB Row",     m:["Lats","Traps","Rear Delts"],  sets:3, reps:"10-12", rest:90, f:[],                    b:["lats","traps","reardelt"]},
    {n:"Face Pulls",            m:["Rear Delts","Rotator Cuff"],  sets:3, reps:"15-20", rest:60, f:[],                    b:["reardelt"]},
    {n:"Incline Dumbbell Curl", m:["Biceps Long Head"],           sets:3, reps:"10-12", rest:60, f:["biceps"],            b:[]},
    {n:"Hammer Curl",           m:["Biceps","Brachialis"],        sets:3, reps:"12-15", rest:60, f:["biceps"],            b:[]},
    {n:"Reverse Curl",          m:["Brachialis","Forearms"],      sets:2, reps:"12-15", rest:60, f:["biceps","forearms"], b:[]}
  ]},
  {day:"Friday", label:"Legs - Hypertrophy", type:"legs",
   mob:["Hip CARs - 5 reps each direction per side","Couch stretch - 60s per side","Adductor rock-back - 10 per side","Ankle wall drill - 10 per side"],
   ex:[
    {n:"Hack Squat",           m:["Quads","Glutes"],         sets:4, reps:"10-12", rest:90, f:["quads"],  b:["glutes"]},
    {n:"Romanian Deadlift",    m:["Hamstrings","Glutes"],    sets:3, reps:"10-12", rest:90, f:[],          b:["hamstrings","glutes"]},
    {n:"Lying Leg Curl",       m:["Hamstrings"],             sets:4, reps:"10-12", rest:90, f:[],          b:["hamstrings"]},
    {n:"Hip Thrust",           m:["Glutes","Hamstrings"],    sets:4, reps:"10-12", rest:90, f:[],          b:["glutes","hamstrings"]},
    {n:"Leg Extension",        m:["Quads"],                  sets:3, reps:"12-15", rest:60, f:["quads"],  b:[]},
    {n:"Standing Calf Raise",  m:["Gastrocnemius","Calves"], sets:4, reps:"12-15", rest:60, f:["calves"], b:["calves"]},
    {n:"Copenhagen Plank",     m:["Adductors","Core"],       sets:3, reps:"20-30s",rest:60, f:["abs"],    b:[]}
  ]},
  {day:"Saturday", label:"Rest and Recovery", type:"rest", mob:[], ex:[]},
  {day:"Sunday",   label:"Rest and Recovery", type:"rest", mob:[], ex:[]}
];

var DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
var ST = {};
try { ST = JSON.parse(localStorage.getItem("gt6") || "{}"); } catch(e) {}
if (!ST.sessions) ST.sessions = {};
var curDay = todayName();
var timers = {};
var sessionStarted = {};

// Web Audio for timer sounds
var AudioCtx = window.AudioContext || window.webkitAudioContext;
var actx = null;
function getACtx() { if (!actx) { try { actx = new AudioCtx(); } catch(e) {} } return actx; }
function beep(freq, dur, type, vol) {
  var ctx = getACtx(); if (!ctx) return;
  try {
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type || "sine";
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol||0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function soundStart() { beep(660, 0.12, "sine", 0.3); setTimeout(function(){ beep(880, 0.18, "sine", 0.3); }, 120); }
function soundEnd()   { beep(520, 0.15, "sine", 0.4); setTimeout(function(){ beep(392, 0.4, "sine", 0.35); }, 150); }

function save() { try { localStorage.setItem("gt6", JSON.stringify(ST)); } catch(e) {} }

function todayName() {
  return DAYS[ [6,0,1,2,3,4,5][new Date().getDay()] ];
}
function dateStr() { return new Date().toISOString().split("T")[0]; }
function sessKey(d) { return dateStr() + "_" + d; }

function progFor(day) {
  for (var i=0; i<PROG.length; i++) if (PROG[i].day===day) return PROG[i];
  return null;
}
function exDef(day, name) {
  var p = progFor(day); if (!p) return null;
  for (var i=0; i<p.ex.length; i++) if (p.ex[i].n===name) return p.ex[i];
  return null;
}

function getOrCreate(day) {
  var k = sessKey(day);
  if (!ST.sessions[k]) {
    var p = progFor(day);
    ST.sessions[k] = {
      day: day, type: p ? p.type : "rest",
      exercises: p ? p.ex.map(function(e){
        var sets = []; for (var i=0;i<e.sets;i++) sets.push({w:"",r:"",done:false});
        return {name:e.n, sets:sets};
      }) : []
    };
    save();
  }
  return ST.sessions[k];
}

function prevBest(name) {
  var ck = sessKey(curDay), best = null;
  Object.keys(ST.sessions).forEach(function(k) {
    if (k===ck) return;
    (ST.sessions[k].exercises||[]).forEach(function(e) {
      if (e.name!==name) return;
      (e.sets||[]).forEach(function(s) {
        if (!s.done||!s.w||!s.r) return;
        var v = parseFloat(s.w)*parseInt(s.r);
        if (!best||v>best.vol) best={w:parseFloat(s.w),r:parseInt(s.r),vol:v};
      });
    });
  });
  return best;
}

function hasPB(ex) {
  var pb = prevBest(ex.name); if (!pb) return false;
  for (var i=0;i<ex.sets.length;i++) {
    var s=ex.sets[i];
    if (s.done&&s.w&&s.r&&parseFloat(s.w)*parseInt(s.r)>pb.vol) return true;
  }
  return false;
}

function calcPct(day) {
  var sess=getOrCreate(day), tot=0, dn=0;
  sess.exercises.forEach(function(e){ tot+=e.sets.length; e.sets.forEach(function(s){if(s.done)dn++;}); });
  return tot ? Math.round(dn/tot*100) : 0;
}

function calcStreak() {
  var streak=0, d=new Date();
  for (var i=0;i<60;i++) {
    var ds=d.toISOString().split("T")[0];
    var dn=DAYS[[6,0,1,2,3,4,5][d.getDay()]];
    var p=progFor(dn);
    if (p&&p.type==="rest"){d.setDate(d.getDate()-1);continue;}
    var sess=ST.sessions[ds+"_"+dn];
    if (sess&&sess.exercises&&sess.exercises.some(function(e){return e.sets&&e.sets.some(function(s){return s.done;});})) {
      streak++;
    } else if (i>0) break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// ── RENDER ────────────────────────────────────────────────────────────

function renderAll() {
  document.getElementById("dateLabel").textContent = new Date().toLocaleDateString("en-DE",{weekday:"long",day:"numeric",month:"long"});
  document.getElementById("streakEl").textContent = "🔥 " + calcStreak() + " day streak";
  renderStrip();
  renderWorkout();
}

function renderStrip() {
  var h="";
  PROG.forEach(function(p) {
    var cls="dpill"+(p.type==="rest"?" rest":"")+(p.day===curDay?" on":"");
    var sub=p.type==="rest"?"Rest":p.type.charAt(0).toUpperCase()+p.type.slice(1);
    h+='<button class="'+cls+'" onclick="setDay(\''+p.day+'\')">'+p.day.slice(0,3)+'<br><span style="font-size:9px;opacity:.7">'+sub+'</span></button>';
  });
  document.getElementById("dstrip").innerHTML=h;
}

window.setDay = function(day){ curDay=day; renderStrip(); renderWorkout(); };
window.beginDay = function(day){ sessionStarted[day]=true; renderWorkout(); };

var BC={push:"bp",pull:"bpu",legs:"bl",upper:"bup",lower:"blo"};

function renderWorkout() {
  var p=progFor(curDay), el=document.getElementById("wcontent");
  if (!p||p.type==="rest") {
    el.innerHTML='<div class="card" style="text-align:center;padding:40px 20px">'
      +'<div style="font-size:48px;margin-bottom:12px">😴</div>'
      +'<div style="font-size:18px;font-weight:700;margin-bottom:6px">Rest Day</div>'
      +'<div style="font-size:13px;color:var(--t3);line-height:1.6">Recovery is where growth happens.<br>Sleep 8h, eat your protein, hydrate.</div>'
      +'</div>';
    return;
  }
  // show finish screen if session already completed
  var sess=getOrCreate(curDay);
  if (sess.finished) { showFinishScreen(sess); return; }
  // show start screen if not yet begun
  if (!sessionStarted[curDay]) { showStartScreen(p); return; }
  var tot=0,dn=0;
  sess.exercises.forEach(function(e){tot+=e.sets.length;e.sets.forEach(function(s){if(s.done)dn++;});});
  // at least one set per exercise checked done = unlocks finish
  var anyDone=sess.exercises.some(function(e){return e.sets.some(function(s){return s.done&&s.w&&s.r;});});
  var pc=tot?Math.round(dn/tot*100):0;
  var bc=BC[p.type]||"";
  var h="";

  h+='<div class="prwrap"><div class="prlbl"><span>'+dn+'/'+tot+' sets</span><span>'+pc+'%</span></div>'
    +'<div class="prtrack"><div class="prfill" id="prfill" style="width:'+pc+'%"></div></div></div>';

  h+='<div class="wcrd"><div class="whdr"><div>'
    +'<div style="font-size:15px;font-weight:700">'+curDay+'</div>'
    +'<div style="font-size:12px;color:var(--t3);margin-top:2px">'+p.label+'</div>'
    +'</div><span class="wbadge '+bc+'">'+p.type.toUpperCase()+'</span></div>';

  h+='<div style="padding:12px 16px;background:var(--surf2);border-top:1px solid var(--b1)">'
    +'<div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Mobility warm-up (8 min)</div>';
  p.mob.forEach(function(m){ h+='<div style="font-size:12px;color:var(--t2);margin-bottom:4px"><span style="color:var(--acc)">- </span>'+m+'</div>'; });
  h+='</div>';

  sess.exercises.forEach(function(ex,ei) {
    var def=exDef(curDay,ex.name);
    var pb=prevBest(ex.name);
    var isPB=hasPB(ex);
    h+='<div class="exblk"><div class="exhdr"><div>';
    h+='<div class="exnm">'+ex.name+(isPB?'<span class="pb">PB</span>':'')+'</div>';
    h+='<div class="extag">'+(def?def.m.join(" · "):"")+' '+(def?def.reps+" reps":"")+(def?" · "+def.rest+"s rest":"")+'</div>';
    h+='</div><button class="mbtn" onclick="openMuscle('+ei+')">&#9432; Muscles</button></div>';

    h+='<div class="sgrid" style="margin-bottom:2px">'
      +'<span></span>'
      +'<span style="font-size:10px;color:var(--t3);text-align:center">kg</span>'
      +'<span style="font-size:10px;color:var(--t3);text-align:center">reps</span>'
      +'<span style="font-size:10px;color:var(--t3);text-align:center">done</span>'
      +'</div>';

    if (pb) h+='<div class="phint">Prev best: '+pb.w+'kg x '+pb.r+' reps</div>';

    ex.sets.forEach(function(st,si) {
      var cc="schk"+(st.done?" on":"");
      var tick=st.done?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':"";
      h+='<div class="sgrid">'
        +'<span class="snum">'+(si+1)+'</span>'
        +'<input class="sinp" type="number" min="0" step="0.5" placeholder="kg" value="'+(st.w||"")+'" oninput="upd('+ei+','+si+',0,this.value)"/>'
        +'<input class="sinp" type="number" min="0" placeholder="reps" value="'+(st.r||"")+'" oninput="upd('+ei+','+si+',1,this.value)"/>'
        +'<button class="'+cc+'" onclick="tog('+ei+','+si+')">'+tick+'</button>'
        +'</div>';
    });

    h+='<button class="asbtn" onclick="addSet('+ei+')">+ Add set</button>';
    h+='<div class="tbar" id="tb'+ei+'">';
    h+='<svg width="50" height="50" viewBox="0 0 50 50">'
      +'<circle cx="25" cy="25" r="21" fill="none" stroke="var(--b2)" stroke-width="4"/>'
      +'<circle cx="25" cy="25" r="21" fill="none" stroke="var(--acc)" stroke-width="4"'
      +' stroke-dasharray="131.9" stroke-dashoffset="131.9" stroke-linecap="round"'
      +' transform="rotate(-90 25 25)" id="tc'+ei+'"/>'
      +'<text x="25" y="30" text-anchor="middle" fill="var(--t2)" font-size="11" font-weight="600" id="tt'+ei+'">1:30</text>'
      +'</svg>';
    h+='<div style="flex:1"><div style="font-size:11px;color:var(--t3);margin-bottom:5px">Rest timer</div>';
    h+='<div class="tpresets">';
    [60,90,120,180].forEach(function(s){
      h+='<button class="tpre'+(s===90?" on":"")+'" id="tp'+ei+'_'+s+'" onclick="setTDur('+ei+','+s+')">'+s+'s</button>';
    });
    h+='</div></div>';
    h+='<button class="tplay" onclick="togTimer('+ei+')">'
      +'<svg width="14" height="14" viewBox="0 0 24 24" fill="white" id="ti'+ei+'"><polygon points="5,3 19,12 5,21"/></svg>'
      +'</button></div></div>';
  });

  h+='</div>';
  h+='<button class="fbtn" id="fbtn" onclick="finish()" '+(anyDone?"":"disabled")+'>'
    +(anyDone?"Finish and sync to Sheets":"Log at least one set to finish")
    +'</button>';

  el.innerHTML=h;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────

window.upd=function(ei,si,field,val){
  var s=getOrCreate(curDay);
  if (field===0) s.exercises[ei].sets[si].w=val;
  else s.exercises[ei].sets[si].r=val;
  save(); refreshBar();
};

window.tog=function(ei,si){
  var s=getOrCreate(curDay);
  s.exercises[ei].sets[si].done=!s.exercises[ei].sets[si].done;
  save(); renderWorkout();
};

window.addSet=function(ei){
  var s=getOrCreate(curDay);
  s.exercises[ei].sets.push({w:"",r:"",done:false});
  save(); renderWorkout();
};

function refreshBar(){
  var pc=calcPct(curDay);
  var f=document.getElementById("prfill"); if(f) f.style.width=pc+"%";
  var ls=document.querySelectorAll(".prlbl span");
  if (ls.length===2){
    var s=getOrCreate(curDay),tot=0,dn=0;
    s.exercises.forEach(function(e){tot+=e.sets.length;e.sets.forEach(function(st){if(st.done)dn++;});});
    ls[0].textContent=dn+"/"+tot+" sets"; ls[1].textContent=pc+"%";
  }
  var fb=document.getElementById("fbtn");
  if (fb){fb.disabled=pc<100;fb.textContent=pc===100?"🎉 Finish and sync to Sheets":"Complete all sets to finish ("+pc+"%)"}
}

// ── TIMERS ────────────────────────────────────────────────────────────

window.setTDur=function(ei,secs){
  if (!timers[ei]) timers[ei]={left:secs,total:secs,running:false,iv:null};
  clearInterval(timers[ei].iv);
  timers[ei].left=secs; timers[ei].total=secs; timers[ei].running=false;
  [60,90,120,180].forEach(function(s){
    var b=document.getElementById("tp"+ei+"_"+s);
    if (b) b.className="tpre"+(s===secs?" on":"");
  });
  updateTimerUI(ei);
};

window.togTimer=function(ei){
  if (!timers[ei]) timers[ei]={left:90,total:90,running:false,iv:null};
  var t=timers[ei];
  if (t.running){
    clearInterval(t.iv); t.running=false; setIcon(ei,false);
  } else {
    if (t.left<=0) t.left=t.total;
    t.running=true; setIcon(ei,true);
    t.iv=setInterval(function(){
      t.left--; updateTimerUI(ei);
      if (t.left<=0){clearInterval(t.iv);t.running=false;setIcon(ei,false);toast("Rest done — go!");}
    },1000);
  }
};

function autoTimer(ei){ /* disabled — timer is manual only */ }

function setIcon(ei,playing){
  var ic=document.getElementById("ti"+ei); if (!ic) return;
  ic.innerHTML=playing
    ?'<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    :'<polygon points="5,3 19,12 5,21"/>';
}

function updateTimerUI(ei){
  var t=timers[ei]; if (!t) return;
  var m=Math.floor(t.left/60),s=t.left%60;
  var tx=document.getElementById("tt"+ei); if(tx) tx.textContent=m+":"+(s<10?"0":"")+s;
  var ci=document.getElementById("tc"+ei);
  if (ci) ci.setAttribute("stroke-dashoffset",(131.9-(t.left/t.total)*131.9).toFixed(1));
}

window.openMuscle=function(ei){
  var p=progFor(curDay); if (!p) return;
  var def=p.ex[ei]; if (!def) return;
  var vid=VIDEOS[def.n]; if (!vid) return;
  document.getElementById("mtitle").textContent=def.n;
  var th="";
  def.m.forEach(function(m){th+='<span style="font-size:11px;background:#2d1b69;color:#c4b5fd;border-radius:6px;padding:3px 8px">'+m+'</span> ';});
  document.getElementById("mtags").innerHTML=th;
  document.getElementById("mframe").src="https://www.youtube.com/embed/"+vid+"?autoplay=1&rel=0&modestbranding=1";
  var tip=TIPS[def.n]||"";
  document.getElementById("mtip").innerHTML='<b style="color:var(--t2)">Coach tip:</b> '+tip;
  document.getElementById("mmodal").classList.add("on");
};

document.getElementById("mclose").onclick=function(){
  document.getElementById("mframe").src="";
  document.getElementById("mmodal").classList.remove("on");
};
document.getElementById("mmodal").addEventListener("click",function(e){
  if(e.target===this){
    document.getElementById("mframe").src="";
    this.classList.remove("on");
  }
});

window.finish=function(){
  var sess=getOrCreate(curDay);
  if (sess.finished) return;
  sess.finished=true; sess.finishedAt=new Date().toISOString();
  // drop uncompleted sets before saving
  sess.exercises.forEach(function(e){
    e.sets=e.sets.filter(function(s){return s.done&&s.w&&s.r;});
  });
  sess.exercises=sess.exercises.filter(function(e){return e.sets.length>0;});
  save();
  if (ST.sheetsUrl) syncSheets(sess);
  showFinishScreen(sess);
};

function showStartScreen(p) {
  var bc=BC[p.type]||"";
  var el=document.getElementById("wcontent");
  var mobHtml="";
  p.mob.forEach(function(m){ mobHtml+='<div style="font-size:13px;color:var(--t2);margin-bottom:6px;display:flex;gap:8px"><span style="color:var(--acc)">-</span>'+m+'</div>'; });
  el.innerHTML='<div class="card" style="text-align:center;padding:32px 20px 28px">'
    +'<span class="wbadge '+bc+'" style="display:inline-block;margin-bottom:14px">'+p.type.toUpperCase()+'</span>'
    +'<div style="font-size:22px;font-weight:700;margin-bottom:4px">'+curDay+'</div>'
    +'<div style="font-size:14px;color:var(--t3);margin-bottom:28px">'+p.label+'</div>'
    +'<div style="background:var(--surf2);border-radius:12px;padding:16px;text-align:left;margin-bottom:28px">'
    +'<div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Mobility warm-up (8 min)</div>'
    +mobHtml
    +'</div>'
    +'<button class="fbtn" style="width:100%;font-size:17px;padding:18px;margin:0" onclick="beginDay(\''+curDay+'\')">Lets Begin</button>'
    +'</div>';
}

function showFinishScreen(sess){
  var vol=0,sets=0;
  sess.exercises.forEach(function(e){
    e.sets.forEach(function(s){
      vol+=(parseFloat(s.w)||0)*(parseInt(s.r)||0);
      sets++;
    });
  });
  var vlbl=vol>=1000?(vol/1000).toFixed(1)+"t":Math.round(vol)+"kg";
  var el=document.getElementById("wcontent");
  el.innerHTML='<div class="card" style="text-align:center;padding:48px 24px">'
    +'<div style="font-size:52px;margin-bottom:16px">🎉</div>'
    +'<div style="font-size:20px;font-weight:700;margin-bottom:8px">Session complete</div>'
    +'<div style="font-size:13px;color:var(--t3);margin-bottom:24px">'+curDay+' workout saved</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px">'
    +'<div class="scrd"><div class="slbl">Volume</div><div class="sval">'+vlbl+'</div></div>'
    +'<div class="scrd"><div class="slbl">Sets done</div><div class="sval">'+sets+'</div></div>'
    +'</div>'
    +(ST.sheetsUrl?'<div style="font-size:12px;color:var(--green);margin-bottom:20px">Syncing to Google Sheets...</div>':'')
    +'</div>';
}

function syncSheets(sess){
  var rows=[],dt=dateStr();
  (sess.exercises||[]).forEach(function(ex){
    (ex.sets||[]).forEach(function(s,i){
      rows.push({date:dt,day:sess.day,exercise:ex.name,set:i+1,reps:s.r||"",weight:s.w||"",
        volume:(parseFloat(s.w)||0)*(parseInt(s.r)||0),notes:s.done?"completed":"skipped"});
    });
  });
  fetch(ST.sheetsUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({rows:rows})})
    .then(function(){
      toast("Synced to Google Sheets!");
      var el=document.getElementById("wcontent");
      if (el) {
        var note=el.querySelector("[data-sync]");
        if (note) note.textContent="Synced to Google Sheets";
      }
    })
    .catch(function(){toast("Sync failed — saved locally");});
}

// ── PROGRESS ──────────────────────────────────────────────────────────

function renderProgress(){
  var sessions=Object.values(ST.sessions);
  var totVol=0,totSess=0,totSets=0;
  sessions.forEach(function(s){
    var any=false;
    (s.exercises||[]).forEach(function(e){
      (e.sets||[]).forEach(function(st){
        totVol+=(parseFloat(st.w)||0)*(parseInt(st.r)||0);
        if(st.done){totSets++;any=true;}
      });
    });
    if(any)totSess++;
  });
  function sc(l,v,s){return '<div class="scrd"><div class="slbl">'+l+'</div><div class="sval">'+v+'</div><div class="ssub">'+s+'</div></div>';}
  document.getElementById("statsGrid").innerHTML=
    sc("Total volume",(totVol/1000).toFixed(1)+"t","all time")+
    sc("Sessions",totSess,"completed")+
    sc("Sets logged",totSets,"total")+
    sc("Streak",calcStreak(),"days 🔥");

  var mv={};
  sessions.forEach(function(s){
    (s.exercises||[]).forEach(function(e){
      var def=exDef(s.day,e.name);
      var vol=(e.sets||[]).reduce(function(a,st){return a+(parseFloat(st.w)||0)*(parseInt(st.r)||0);},0);
      (def?def.m:["Other"]).forEach(function(m){mv[m]=(mv[m]||0)+vol;});
    });
  });
  var top=Object.keys(mv).map(function(k){return[k,mv[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  var maxV=top.length?top[0][1]:1;
  var ch="";
  top.forEach(function(e){
    var lbl=e[1]>=1000?(e[1]/1000).toFixed(1)+"t":Math.round(e[1])+"kg";
    var w=Math.round(e[1]/maxV*100);
    ch+='<div class="brow"><span class="blbl">'+e[0]+'</span>'
      +'<div class="btrack"><div class="bfill" style="width:'+w+'%"><span class="bval">'+lbl+'</span></div></div></div>';
  });
  document.getElementById("volChart").innerHTML=ch||'<div style="color:var(--t3);font-size:13px">No data yet.</div>';

  var recent=Object.keys(ST.sessions)
    .filter(function(k){var s=ST.sessions[k];return s.exercises&&s.exercises.some(function(e){return e.sets&&e.sets.some(function(st){return st.done;});});})
    .sort(function(a,b){return b.localeCompare(a);}).slice(0,8);
  var hh="";
  recent.forEach(function(k){
    var s=ST.sessions[k],dt=k.split("_")[0];
    var vol=(s.exercises||[]).reduce(function(a,e){return a+(e.sets||[]).reduce(function(b,st){return b+(parseFloat(st.w)||0)*(parseInt(st.r)||0);},0);},0);
    var sets=(s.exercises||[]).reduce(function(a,e){return a+(e.sets||[]).filter(function(st){return st.done;}).length;},0);
    var vlbl=vol>=1000?(vol/1000).toFixed(1)+"t":Math.round(vol)+"kg";
    var badge=BC[s.type]||"";
    hh+='<div class="hitem">'
      +'<div><div style="font-size:14px;font-weight:600">'+s.day+'</div>'
      +'<div style="font-size:11px;color:var(--t3);margin-top:2px">'+dt+' &middot; '+sets+' sets</div></div>'
      +'<div style="text-align:right"><span class="wbadge '+badge+'" style="display:inline-block;margin-bottom:4px">'+(s.type||"").toUpperCase()+'</span>'
      +'<div style="font-size:12px;color:var(--t3)">'+vlbl+'</div></div></div>';
  });
  document.getElementById("histList").innerHTML=hh||'<div style="color:var(--t3);font-size:13px;padding:0 16px">No sessions yet.</div>';
}

// ── SETTINGS ──────────────────────────────────────────────────────────

function renderSettings(){
  document.getElementById("ssUrl").value=ST.sheetsUrl||"";
  document.getElementById("ssStatus").innerHTML=ST.sheetsUrl
    ?'<div class="sstatus sconn"><span class="dot dg"></span>Connected to Google Sheets</div>'
    :'<div class="sstatus sdisc"><span class="dot dr"></span>Not connected</div>';
}
window.saveSheets=function(){
  var u=document.getElementById("ssUrl").value.trim();
  if(!u){toast("Enter a URL first");return;}
  ST.sheetsUrl=u;save();renderSettings();toast("Sheets URL saved!");
};
window.clearSheets=function(){delete ST.sheetsUrl;save();renderSettings();toast("Disconnected");};
window.exportCSV=function(){
  if(!Object.keys(ST.sessions).length){toast("No data to export");return;}
  var rows=[["Date","Day","Exercise","Set","Reps","Weight(kg)","Volume","Done"]];
  Object.keys(ST.sessions).forEach(function(k){
    var s=ST.sessions[k],dt=k.split("_")[0];
    (s.exercises||[]).forEach(function(e){
      (e.sets||[]).forEach(function(st,i){
        rows.push([dt,s.day,e.name,i+1,st.r||"",st.w||"",(parseFloat(st.w)||0)*(parseInt(st.r)||0),st.done?"yes":"no"]);
      });
    });
  });
  var csv=rows.map(function(r){return r.join(",");}).join("\n");
  var a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download="gymtrack.csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
};
window.confirmClear=function(){
  if(confirm("Clear all workout data?")){ST.sessions={};save();renderAll();toast("Data cleared");}
};

// ── NAV ───────────────────────────────────────────────────────────────

window.showPage=function(name){
  ["today","progress","settings"].forEach(function(n){
    document.getElementById("p"+n).classList[n===name?"add":"remove"]("on");
    document.getElementById("n"+n).classList[n===name?"add":"remove"]("on");
  });
  if(name==="today") renderWorkout();
  if(name==="progress")renderProgress();
  if(name==="settings")renderSettings();
};

function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("on");
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("on");},2600);
}

renderAll();
})();
</script>
</body>
</html>
